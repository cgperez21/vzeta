name: Construir y subir imagen
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Setup Docker BuildX
        uses: docker/setup-buildx-action@v2

      - name: Login a Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_NAME }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Build & Push de myapp_container
        uses: docker/build-push-action@v4
        with:
          context: ./myapp
          push: true
          tags: ${{ secrets.DOCKERHUB_NAME }}/myapp_container:latest

      - name: Build & Push de mynginx_container
        uses: docker/build-push-action@v4
        with:
          context: ./mynginx
          push: true
          tags: ${{ secrets.DOCKERHUB_NAME }}/mynginx_container:latest
